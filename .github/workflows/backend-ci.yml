name: Backend CI

on:
  pull_request:
    branches: [main]
    paths:
      - "backend/**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: backend
      - name: Install sqlc
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest
      - name: Verify SQLC Generation
        run: |
          sqlc generate
          if [ -n "$(git status --porcelain)" ]; then
            echo "❌ ERRO: O código gerado pelo SQLC está desatualizado."
            echo "Por favor, rode 'sqlc generate' localmente e faça o commit das mudanças."
            git diff
            exit 1
          fi
      - name: Test
        run: go test ./... -v
      - name: Build
        run: go build -v ./...
